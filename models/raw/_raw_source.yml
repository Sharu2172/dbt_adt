sources:
  - name: raw_jaffle_shop
    description: Source data loaded from the jaffle_shop application schema.
    database: raw
    schema: jaffle_shop
    tables:
      - name: customers
        description: Customer records from the jaffle_shop application.
        config:
          freshness: null
        columns:
          - name: id
            description: Primary key for each customer record.
            data_type: integer
            data_tests:
              - unique
              - not_null
          - name: first_name
            description: Customer's given name.
            data_type: text
          - name: last_name
            description: Customer's family name.
            data_type: text
      - name: orders
        description: Order records from the jaffle_shop application.
        config: 
          freshness:
            warn_after:
              count: 2
              period: day
          loaded_at_field: _etl_loaded_at
        columns:
          - name: id
            description: Primary key for each order.
            data_type: integer
            data_tests:
              - not_null
              - unique
          - name: user_id
            description: Foreign key to the customer who placed the order.
            data_type: integer
            data_tests:
              - not_null
              - relationships:
                  arguments: 
                    to: source('raw_jaffle_shop', 'customers')
                    field: id
          - name: order_date
            description: Date the order was created.
            data_type: date
          - name: status
            description: Current lifecycle status of the order.
            data_type: text
          - name: _etl_loaded_at
            description: Timestamp when the row was loaded into the warehouse.
            data_type: timestamp
            
  - name: raw_stripe
    description: Source data loaded from the Stripe payments schema.
    database: raw
    schema: stripe
    tables:
      - name: payment
        description: Payment transaction records from Stripe.
        config:
          freshness:
            warn_after:
              count: 2
              period: day
          loaded_at_field: _batched_at
        columns:
          - name: id
            description: Primary key for each payment record.
            data_type: integer
          - name: orderid
            description: Foreign key to the related order.
            data_type: integer
          - name: paymentmethod
            description: Payment method used for the transaction.
            data_type: text
          - name: status
            description: Current processing status of the payment.
            data_type: text
          - name: amount
            description: Payment amount captured for the transaction.
            data_type: integer
          - name: created
            description: Date the payment record was created.
            data_type: date
          - name: _batched_at
            description: Timestamp when the row was loaded into the warehouse.
            data_type: timestamp_ntz
