models:
  - name: raw_customers
    description: Renamed customer source data with contract-enforced column names.
    config: 
      contract: 
        enforced: true
    columns:
      - name: cust_id
        description: Primary key for each customer.
        data_type: integer
        data_tests:
          - not_null
      - name: cust_first_name
        description: Customer's given name.
        data_type: text
      - name: cust_last_name
        description: Customer's family name.
        data_type: text

  - name: raw_orders
    description: Renamed order source data with order-level business fields.
    columns:
      - name: id
        description: Primary key for each order.
        data_type: integer
        data_tests:
          - not_null
          - unique
      - name: user_id
        description: Customer identifier associated with the order.
        data_type: integer
        data_tests:
          - not_null
          - relationships:
              arguments: 
                to: ref('raw_customers')
                field: cust_id
      - name: order_date
        description: Date the order was placed.
        data_type: date
        data_tests:
          - not_null
      - name: status
        data_type: text
        description: "{{ doc('order_status') }}"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['returned', 'completed', 'return_pending', 'shipped', 'placed']
  
  - name: raw_payment
    description: Renamed payment source data with order-linked payment fields.
    columns:
      - name: id
        description: Primary key for each payment.
        data_type: integer
        data_tests:
          - not_null
          - unique
      - name: orderid
        description: Identifier of the order associated with the payment.
        data_type: integer
        data_tests:
          - relationships:
              arguments: 
                to: ref('raw_orders')
                field: id
      - name: paymentmethod
        description: Payment method used for the transaction.
        data_type: text
      - name: status
        description: Current status of the payment transaction.
        data_type: text
      - name: amount
        description: Amount processed in the payment transaction.
        data_type: integer
      - name: created
        description: Date the payment was created.
        data_type: date
