models:
  - name: raw_customers
    description: Renamed customer source data with contract-enforced column names.
    config: 
      contract: 
        enforced: true
    columns:
      - name: customer_id
        description: Primary key for each customer.
        data_type: integer
        data_tests:
          - not_null
          - unique
      - name: customer_name
        description: Customer's Full Name.
        data_type: text
        data_tests:
          - not_null
          - unique

  - name: raw_orders
    description: Renamed order source data with order-level business fields.
    columns:
      - name: order_id
        description: Primary key for each order.
        data_type: integer
        data_tests:
          - not_null
          - unique
      - name: customer_id
        description: Customer identifier associated with the order.
        data_type: integer
        data_tests:
          - not_null
          - relationships:
              arguments: 
                to: ref('raw_customers')
                field: customer_id
      - name: order_date
        description: Date the order was placed.
        data_type: date
        data_tests:
          - not_null
      - name: order_status
        data_type: text
        description: "{{ doc('order_status') }}"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['returned', 'completed', 'return_pending', 'shipped', 'placed']
  
  - name: raw_payment
    description: Renamed payment source data with order-linked payment fields.
    columns:
      - name: payment_id
        description: Primary key for each payment.
        data_type: integer
        data_tests:
          - not_null
          - unique
      - name: order_id
        description: Identifier of the order associated with the payment.
        data_type: integer
        data_tests:
          - relationships:
              arguments: 
                to: ref('raw_orders')
                field: order_id
      - name: paymentmethod
        description: Payment method used for the transaction.
        data_type: text
      - name: payment_status
        description: Current status of the payment transaction.
        data_type: text
      - name: amount
        description: Amount processed in the payment transaction.
        data_type: integer
        data_tests:
          - positive_amount
      - name: payment_date
        description: Date the payment was made.
        data_type: date
