models:
  - name: raw_customers
    config: 
      contract: 
        enforced: true
    columns:
      - name: cust_id
        data_type: integer
        data_tests:
          - not_null
      - name: cust_first_name
        description: First Name of the customer
        data_type: text
      - name: cust_last_name
        description: Last Name of the customer
        data_type: text

  - name: raw_orders
    description: Table containing orders information.
    columns:
      - name: id
        description: Unique order id
        data_type: integer
        data_tests:
          - not_null
          - unique
      - name: user_id
        description: Customer id
        data_type: integer
        data_tests:
          - not_null
      - name: order_date
        description: Order Date
        data_type: date
        data_tests:
          - not_null
      - name: status
        data_type: text
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['returned', 'completed', 'return_pending', 'shipped', 'placed']
      - name: _etl_loaded_at
        data_type: timestamp
  
  - name: raw_payment
    columns:
      - name: id
        description: Unique payment id
        data_type: integer
        data_tests:
          - not_null
          - unique
      - name: orderid
        data_type: integer
        data_tests:
          - relationships:
              arguments: 
                to: source('raw_jaffle_shop', 'customers')
                field: id
      - name: paymentmethod
        data_type: text
      - name: status
        data_type: text
      - name: amount
        data_type: integer
      - name: created
        data_type: date