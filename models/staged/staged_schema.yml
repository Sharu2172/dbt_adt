models:
  - name: stg_customer_orders
    config:
      materialized: table
    columns:
      - name: first_name
        data_type: text
        data_tests:
          - not_null
      - name: last_name
        data_type: text
        data_tests:
          - not_null
      - name: order_date
        data_type: date
        data_tests:
          - not_null
      - name: status
        data_type: text
        data_tests:
          - accepted_values:
              arguments:
                values: ['completed', 'shipped']